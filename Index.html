<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #007BFF;
            color: white;
            padding: 20px;
        }

        .container {
            padding: 40px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        footer {
            margin-top: 40px;
            padding: 10px;
            background-color: #ddd;
        }
    </style>
</head>

<body>

<header>
    <h2>My Website</h2>
</header>

<div class="container">
    <h1>Welcome to My Website</h1>
    <p>This is my personal website. Thank you for visiting.</p>

    <a href="#" class="btn">Learn More</a>
</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
